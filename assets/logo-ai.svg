<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MRK logo built from AI and probabilistic concepts">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5faff"/>
      <stop offset="100%" stop-color="#eefbf5"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2f79a8"/>
      <stop offset="100%" stop-color="#1f9f9b"/>
    </linearGradient>
    <linearGradient id="prob" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#f2a55e"/>
      <stop offset="100%" stop-color="#2aa6a4"/>
    </linearGradient>
  </defs>

  <rect x="12" y="12" width="232" height="232" rx="50" fill="url(#bg)" stroke="#bfd7ea" stroke-width="3"/>
  <circle cx="128" cy="126" r="84" fill="none" stroke="#c9dfef" stroke-width="4" opacity="0.72"/>

  <!-- M: neural graph links -->
  <g stroke="url(#ink)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M44 170V90"/>
    <path d="M44 90L68 130L92 90"/>
    <path d="M92 90V170"/>
  </g>
  <g fill="#ffffff" stroke="#82acd0" stroke-width="3">
    <circle cx="44" cy="90" r="7"/>
    <circle cx="68" cy="130" r="7"/>
    <circle cx="92" cy="90" r="7"/>
    <circle cx="44" cy="170" r="7"/>
    <circle cx="92" cy="170" r="7"/>
  </g>

  <!-- R: transformer-like stacked layers + leg -->
  <g fill="#e8f3ff" stroke="#95b8d8" stroke-width="2.5">
    <rect x="108" y="88" width="16" height="12" rx="6"/>
    <rect x="108" y="106" width="16" height="12" rx="6"/>
    <rect x="108" y="124" width="16" height="12" rx="6"/>
    <rect x="108" y="142" width="16" height="12" rx="6"/>
    <rect x="108" y="160" width="16" height="12" rx="6"/>
    <rect x="122" y="88" width="40" height="12" rx="6"/>
    <rect x="122" y="106" width="40" height="12" rx="6"/>
    <rect x="122" y="124" width="30" height="12" rx="6"/>
  </g>
  <g stroke="url(#ink)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M116 88H140C154 88 162 96 162 110C162 124 154 132 140 132H116"/>
    <path d="M138 132L165 170"/>
  </g>

  <!-- K: attention branch structure -->
  <g stroke="url(#ink)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M178 170V90"/>
    <path d="M178 130L212 92"/>
    <path d="M178 130L212 170"/>
  </g>
  <g fill="#ffffff" stroke="#82acd0" stroke-width="3">
    <circle cx="178" cy="130" r="7"/>
    <circle cx="212" cy="92" r="7"/>
    <circle cx="212" cy="170" r="7"/>
  </g>

  <!-- Probabilistic model curve -->
  <path d="M42 196C66 176 88 176 110 192C132 208 154 208 176 190C192 178 206 178 214 184" fill="none" stroke="url(#prob)" stroke-width="8" stroke-linecap="round"/>
  <g fill="#ffffff" stroke="#8db0cf" stroke-width="3">
    <circle cx="42" cy="196" r="5"/>
    <circle cx="110" cy="192" r="5"/>
    <circle cx="176" cy="190" r="5"/>
    <circle cx="214" cy="184" r="5"/>
  </g>
</svg>
